name: conexia
description: Conecta. Crece. Gana.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  # Navegación
  go_router: ^12.1.3
  # Estado
  flutter_riverpod: ^2.4.9
  # Firebase (agregar cuando tengas el proyecto Firebase)
  # firebase_core: ^2.24.2
  # firebase_auth: ^4.15.3
  # cloud_firestore: ^4.13.6
  # Imágenes en red con caché
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ── FUENTE POPPINS ──
  # 1. Descarga Poppins desde fonts.google.com
  # 2. Crea la carpeta assets/fonts/ en tu proyecto
  # 3. Copia los archivos .ttf ahí
  # 4. Descomenta estas líneas:

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

  # ── IMÁGENES ──
  # 1. Crea la carpeta assets/images/ en tu proyecto
  # 2. Agrega tu ilustración hero_illustration.png
  # 3. Descomenta estas líneas:

  assets:
  - assets/images/